body:
  text: 卷一短歌行仰瞻帷幕俯察几筵其物如故其人不存一解神靈倏忽棄我遐遷靡瞻靡恃泣涕連連二解呦呦遊鹿銜草鳴麑翩翩飛鳥挾子巢棲三解我獨孤煢懷此百離憂心孔疚莫我能知四解人亦有言憂令人老嗟我白髮生一何早五解長吟永歎懷我聖考曰仁者壽胡不是保六解宋書樂志樂府詩集三十廣文選十三詩紀十二秋胡行三首堯任舜禹當復何為百獸率舞鳳凰來儀得人則安失人則危唯賢知賢人不易知歌以詠言誠不易移鳴條之役萬舉必全明德通靈降福自天類聚四十一樂府詩集三十六廣文選十三廣文選八朝與佳人期日夕殊不來嘉肴不嘗旨酒停杯寄言飛鳥告余不能俯折蘭英仰結桂枝佳人不在結之何為從爾何所之乃在大海隅靈若道言貽爾明珠企予望之步立踟躕佳人不來何得斯須類聚四十一樂府詩集三十六廣文選十三詩紀十二汎汎綠池中有浮萍寄身流波隨風靡傾芙蓉含芳菡萏垂榮朝采其實夕佩其英采之遺誰所思在庭雙魚比目鴛鴦交頸有美一人婉如清揚知音識曲善為樂方類聚四十一樂府詩集三十六廣文選八詩紀十二善哉行二首善哉行二首上山採薇薄暮苦饑谿谷多風霜露沾衣一解野雉群雊猴猿相追還望故鄉鬱何壘壘二解高山有崖林木有枝憂來無方人莫之知三解人生如寄多憂何為今我不樂歲月如馳四解湯湯川流中有行舟隨波轉薄有似客遊五解策我良馬被我輕裘載馳載驅聊以忘憂六解宋書樂志文選二十七樂府詩集三十六文章正宗二十九詩紀十二又類聚四十一引飢衣枝之馳舟遊七韻文選十三月賦注引衣一韻十八懷舊賦注作古樂府引壘一韻有美一人婉如清揚妍姿巧笑和媚心腸知音識曲善為樂方哀絃微妙清氣含芳流鄭激楚度宮中商感心動耳綺麗難忘離鳥夕宿在彼中洲延頸鼓翼悲鳴相求眷然顧之使我心愁嗟爾昔人何以忘憂樂府詩集三十六廣文選十三詩紀十二又類聚四十一引陽方商忘四韻杜公瞻編珠二作魏武帝樂府詩引商忘二韻丹霞蔽日行丹霞蔽日采虹垂天谷水潺潺木落翩翩孤禽失群悲鳴雲間月盈則沖華不再繁古來有之嗟我何言類聚四十一樂府詩集三十七廣文選十三詩紀十二煌煌京洛行煌煌京洛行夭夭園桃無子空長虛美難假偏輪不行一解淮陰五刑鳥盡弓藏保身全名獨有子房大憤不收襃衣無帶多言寡誠祇令事敗二解蘇秦之說六國以亡傾側賣主車裂固當賢矣陳軫忠而有謀楚懷不從禍卒不救三解禍夫吳起智小謀大西河何健伏尸何劣四解嗟彼郭生古之雅人智矣燕昭可謂得臣峨峨仲連齊之高士北辭千金東蹈滄海五解宋書樂志樂府詩集三十九廣文選十二詩紀十二類聚四十二引人臣士海四韻又文選十八笙賦注引長行二韻釣竿行東越河濟水遙望大海涯釣竿何珊珊魚尾何簁簁行路之好者芳餌欲何為藝文類聚四十一詩紀十二十五登山而遠望谿谷多所有楩柟千餘尺眾草芝盛茂華葉耀人目五色難可紀雉雊山鷄鳴虎嘯谷風起號羆當我道狂顧動牙齒宋書樂志樂府詩集二十七廣文選十三詩紀十二猛虎行與君媾新歡託配於二儀充列于紫微升降焉可知梧桐攀鳳翼雲雨散洪池類聚四十一樂府詩集三十一詩紀十二善哉行善哉行朝日樂相樂酣飲不知醉悲絃激新聲長笛吐清氣一解絃歌感人腸四坐皆歡悅寥寥高堂上涼風入我室二解持滿如不盈有德者能卒君子多苦心所愁不但一三解慊慊下白屋吐握不可失眾賓飽滿歸主人苦不悉四解比翼翔雲漢羅者安所羇沖靜得自然榮華何足為五解宋書樂志樂府詩集三十六詩紀十二又書鈔五十一及一百十引氣一韻初學記十四引醉氣二韻同前同前朝遊高臺觀夕宴華池陰大酋奉甘醪狩人獻嘉禽一解齊倡發東舞秦箏奏西音有客從南來為我彈清琴二解五音紛繁會拊者激微吟淫魚乘波聽踴躍自浮沈三解飛鳥翻翔舞悲鳴集北林樂極哀情來寥亮摧肝心四解清角豈不妙德薄所不任大哉子野言弭絃且自禁五解宋書樂志樂府詩集三十六詩紀十二又書鈔一百一一百七引音一韻類聚二十八引陰禽音林心五韻文選三十一代君子有所思注及雜體詩注引陰一韻廣文選九折楊柳行折楊柳行西山亦何高高高殊無極上有兩仙僮不飲亦不食與我一丸藥光耀有五色一解服藥四五日身體生羽翼輕舉乘浮雲倏忽行萬億流覽觀四海茫茫非所識二解彭祖稱七百悠悠安可原老聃適西戎于今竟不還王喬假虛辭赤松垂空言三解達人識真偽愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀四解宋書樂志樂府詩集三十七廣文選十三詩紀十二類聚七十八引極食色翼億識六韻文選二十二宿東園注引極食色翼四韻初學記五引極食二韻白帖九引色一韻舊唐書九十五御覽九百八十四並引極食色翼四韻御覽四十五寰宇記五十五並引食一韻廣文選九引極食色翼億識六韻燕歌行二首秋風蕭瑟天氣涼草木搖落露為霜群燕辭歸雁南翔念君客遊多思腸慊慊思歸戀故鄉君何淹留寄他方賤妾煢煢守空房憂來思君不可忘不覺淚下沾衣裳援琴鳴絃發清商短歌微吟不能長明月皎皎照我床星漢西流夜未央牽牛織女遙相望爾獨何辜限河梁宋書樂志文選二十七玉臺新詠九樂府詩集三十二詩紀十二類聚四十二引涼霜腸方忘五韻初學記三引涼霜二韻別日何易會日難山川遙遠路漫漫鬱陶思君未敢言寄聲浮雲往不還涕零雨面毀容顏誰能懷憂獨不歎展詩清歌聊自寬樂往哀來摧肺肝耿耿伏枕不能眠披衣出戶步東西仰看星月觀雲間飛鳥晨鳴聲可憐留連顧懷不能存玉臺新詠九樂府詩集三十二詩紀十二又初學記十五引難漫言還四韻別日何易會日難山川悠遠路漫漫一解鬱陶思君未敢言寄書浮雲往不還二解涕零雨面毀形顏誰能懷憂獨不歎三解耿耿伏枕不能眠披衣出戶步東西四解展詩清歌聊自寬樂往哀來摧心肝悲風清厲秋氣寒羅帷徐動經秦軒五解仰戴星月觀雲間飛鳥晨鳴聲氣可憐留連懷顧不自存六解宋書樂志樂府詩集三十二詩紀十二臨高臺臨高臺臨臺行高高以軒下有水清且寒中有黃鵠往且翻行為臣當盡忠願今皇帝陛下三千歲宜居此宮鵠欲南遊雌不能隨我欲躬銜汝口噤不能開我欲負之毛衣摧頹五里一顧六里徘徊類聚四十二樂府詩集十八廣文選十二詩紀十二又文選二十侍五官中郎將建章臺集詩注作古辭引頹一韻陌上桑棄故鄉離室宅遠從軍旅萬里客披荊棘求阡陌側足獨窘步路局苲虎豹嗥動雞驚禽失群鳴相索登南山奈何蹈盤石樹木叢生鬱差錯寢蒿草蔭松柏涕泣雨面霑枕席伴旅單稍稍日零落惆悵竊自憐相痛惜宋書樂志樂府詩集二十八廣文選十三詩紀十二上留田行居世一何不同上留田富人食稻與粱上留田貧子食糟與糠上留田貧賤亦何傷上留田祿命懸在蒼天上留田今爾歎息將欲誰怨上留田類聚四十一樂府詩集三十八文選補遺三十四廣文選十三詩紀十二大牆上蒿行陽春無不長成草木群類隨大風起零落若何翩翩中心獨立一何煢四時舍我驅馳今我隱約欲何為人生居天壤間忽如飛鳥棲枯枝我今隱約欲何為適君身體所服何不恣君口腹所嘗冬被貂鼲溫暖夏當服綺羅輕涼行力自苦我將欲何為不及君少壯之時乘堅車策肥馬良上有滄浪之天今我難得久來視下有蠕蠕之地今我難得久來履何不恣意遨遊從君所喜帶我寶劍今爾何為自低卬悲麗平壯觀白如積雪利如秋霜駮犀標首玉琢中央帝王所服辟除凶殃御左右奈何致福祥吳之辟閭越之步光楚之龍泉韓有墨陽苗山之鋌羊頭之鋼知名前代咸自謂麗且美曾不如君劍良綺難忘冠青雲之崔嵬纖羅為纓飾以翠翰既美且輕表容儀俯仰垂光榮宋之章甫齊之高冠亦自謂美蓋何足觀排金鋪坐玉堂風塵不起天氣清涼奏桓瑟舞趙倡女娥長歌聲協宮商感心動耳蕩氣回腸酌桂酒鱠鯉魴與佳人期為樂康前奉玉卮為我行觴今日樂不可忘樂未央為樂常苦遲歲月逝忽若飛何為自苦使我心悲樂府詩集三十九詩紀十二又書鈔百二十二作魏文帝歌引昂央祥三韻及昂霜二韻文選三十九七命注豔歌何嘗行何嘗快獨無憂但當飲醇酒炙肥牛一解長兄為二千石中兄被貂裘二解小弟雖無官爵鞍馬往來王侯長者遊三解但當在王侯殿上快獨摴蒲六博對坐彈棋四解男兒居世各當努力蹙迫日暮殊不久留五解少小相觸抵寒苦常相隨忿恚安足諍吾中道與卿共別離約身奉事君禮節不可虧上慚滄浪之天下顧黃口小兒奈何復老心皇皇獨悲誰能知宋書樂志作古詞樂府詩集三十九廣文選十三詩紀十二月重輪行三辰垂光照臨四海煥哉何煌煌悠悠與天地久長愚見目前聖覩萬年明闇相絕何可勝言類聚四十二樂府詩集四十詩紀十二黎陽作三首朝發鄴城夕宿韓陵霖雨載塗輿人困窮載馳載驅沐雨櫛風舍我高殿何為泥中在昔周武爰暨公旦載主南征救民塗炭彼此一時唯天所讚我獨何人能不靖亂類聚五十九廣文選九詩紀十二殷殷其雷濛濛其雨我徒我車涉此艱阻遵彼洹湄言刈其楚班之中路塗潦是御轔轔大車載低載昂嗷嗷僕夫載仆載僵蒙塗冒雨沾衣濡裳類聚五十九廣文選九詩紀十二千騎隨風靡萬騎正龍驤金鼓震上下干戚紛縱橫白旄若素霓丹旗發朱光追思太王德胥宇識足臧經歷萬歲林行行到黎陽類聚五十九詩紀十二於清河見挽船士新婚與妻別於清河見挽船士新婚與妻別與君結新婚宿昔當別離涼風動秋草蟋蟀鳴相隨冽冽寒蟬吟蟬吟抱枯枝枯枝時飛揚身體忽遷移不悲身遷移但惜歲月馳歲月無窮極會合安可知願為雙黃鵠比翼戲清池於譙作清夜延貴客明燭發高光豐膳漫星陳旨酒盈玉觴絃歌奏新曲游響拂丹梁餘音赴迅節慷慨時激揚獻酬紛交錯雅舞何鏘鏘羅纓從風飛長劍自低昂穆穆眾君子和合同樂康詩紀十二書鈔百六引陽揚二韻初學記十四引光觴梁揚鏘昂六韻又引光觴二韻又十五引梁揚二韻孟津孟津良辰啟初節高會構歡娛通天拂景雲俯臨四達衢羽爵浮象樽珍膳盈豆區清歌發妙曲樂正奏笙竽曜靈忽西邁炎燭繼望舒翊日浮黃河長驅旋鄴都詩紀十二類聚二十八引娛竽舒都四韻七十三引娛區二韻初學記十四引娛衢區三韻芙蓉池作乘輦夜行遊逍遙步西園雙渠相溉灌嘉木繞通川卑枝拂羽蓋脩條摩蒼天驚風扶輪轂飛鳥翔我前丹霞夾明月華星出雲間上天垂光彩五色一何鮮壽命非松喬誰能得神仙遨遊快心意保己終百年文選二十七詩紀十二又類聚九御覽五百九十二並引園川天間年五韻於玄武陂作兄弟共行遊驅車出西城野田廣開闢川渠互相經黍稷何鬱鬱流波激悲聲菱芡覆綠水芙蓉發丹榮柳垂重蔭綠向我池邊生乘渚望長洲群鳥讙譁鳴萍藻泛濫浮澹澹隨風傾忘憂共容與暢此千秋情古詩類苑十五詩紀十二又類聚九廣文選十並引城經聲榮生鳴傾七韻至廣陵於馬上作觀兵臨江水水流何湯湯戈矛成山林玄甲耀日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航不戰屈敵虜戢兵稱賢良古公宅岐邑實始剪殷商孟獻營虎牢鄭人懼稽顙充國務耕殖先零自破亡興農淮泗間築室都徐方量宜運權略六軍咸悅康豈如東山詩悠悠多憂傷魏志文帝紀注引魏書御覽五百九十一廣文選十詩紀十二又類聚五十九引湯光航良四韻雜詩二首漫漫秋夜長烈烈北風涼展轉不能寐披衣起彷徨彷徨忽已久白露沾我裳俯視清水波仰看明月光天漢回西流三五正縱橫草蟲鳴何悲孤鴈獨南翔鬱鬱多悲思綿綿思故鄉願飛安得翼欲濟河無梁向風長歎息斷絕我中腸文選二十九文章正宗二十九詩紀十二又類聚二十七作魏文帝詩引涼佯光鄉梁五韻西北有浮雲亭亭如車蓋惜哉時不遇適與飄風會吹我東南行行行至吳會吳會非我鄉安得久留滯棄置勿復陳客子常畏人文選二十九文章正宗二十九事類賦雲賦注詩紀十二又御覽八杜公瞻編珠一並引蓋一韻於明津作遙遙山上亭皎皎雲間星遠望使心懷遊子戀所生驅車出北門遙望河陽城凱風吹長棘夭夭枝葉傾黃鳥飛相追咬咬弄音聲佇立望西河泣下沾羅纓類聚二十七詩紀十二清河作清河作方舟戲長水湛澹自浮沈絃歌發中流悲響有餘音音聲入君懷悽愴傷人心心傷安所念但願恩情深願為晨風鳥雙飛翔北林玉臺新詠二廣文選九詩紀十二又藝文類聚二十八引沉音二韻代劉勳妻王氏雜詩二首代劉勳妻王氏雜詩二首王宋者平虜將軍劉勳妻也入門二十餘年後勳悅山陽司馬氏女以宋無子出之還於道中作詩二首玉臺新詠二翩翩床前帳張以蔽光輝昔將爾同去今將爾共歸緘藏篋笥裏當復何時披玉臺新詠二作劉勳妻王氏雜詩類聚二十九作魏文帝代劉勳出妻王氏詩詩紀十二誰言去婦薄去婦情更重千里不唾井況乃昔所奉遠望未為遙歭𣦠不得共黎陽作奉辭討罪遐征晨過黎山巉崢東濟黃河金營北觀故宅頓傾中有高樓亭亭荊棘繞蕃叢生南望果園青青霜露慘悽宵零彼桑梓兮傷情類聚五十九詩紀十二寡婦並序友人阮元瑜早亡傷其妻孤寡為作此詩霜露紛兮交下木葉落兮淒淒候鴈叫兮雲中歸燕翩兮徘徊妾心感兮惆悵白日急兮西頹守長夜兮思君魂一夕兮九乖悵延佇兮仰視星月隨兮天迴徒引領兮入房竊自憐兮孤棲願從君兮終沒愁何可兮久懷類聚三十四詩紀十二令詩喪亂悠悠過紀白骨從橫萬里哀哀下民靡恃吾將以時整理復子明辟致仕三國志文帝紀注引獻帝傳禪代眾事詩紀十二夏詩夏時饒溫和避暑就清涼北坐高閣下延賓作名倡絃歌隨風厲吐羽含徵商嘉餚重疊來珍果在一傍棊局縱橫陳博弈合雙揚功拙更勝負歡美樂人腸從朝至日夕安知夏節長詩紀十二又初學記十五作魏文帝詩引倡商二韻御覽二十三作魏文帝詩引涼倡傍揚腸長六韻飲馬長城窟行浮舟橫大江討彼犯荊虜武將齊貫錍征人伐金鼓長戟十萬隊幽冀百石弩發機若雷電一發連四五類聚四十一樂府詩集三十八詩紀十二又書鈔百二十五引弩五二韻失題巾車出鄴宮校獵東橋津重罝施密網罕篳飄如雲彎弓忽高馳一發連雙麇類聚九十五詩紀十二又初學記二十二引津雲二韻御覽九百七引津麇二韻見挽船士兄弟辭別詩見挽船士兄弟辭別詩鬱鬱河邊樹青青野田草舍我故鄉客將適萬里道妻子牽衣袂落淚霑懷抱還附幼童子顧託兄與嫂辭訣未及終嚴駕一何早負笮引文舟飽渴常不飽誰令爾貧賤咨嗟何所道樂府詩集三十七書鈔百三十八作魏文帝詩引食一韻初學記十八引道抱二韻白帖六作魏文帝詩
