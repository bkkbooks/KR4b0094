body:
  text: 附錄董逃行董逃行晨背大河南轅跋涉遐路漫漫師徒百萬譁諠戈矛若林成山旌旗拂日蔽天御覽三百三十九折楊柳行折楊柳行端居若無悰駕遊博望山文選二十一謝朓遊東園詩注詩詩一行行遊且獵且獵路南隅彎我烏號弓騁我纖驪駒走者貫鋒鏑伏者值戈殳白日未及移手獲三十餘御覽三百五十三詩詩二蜘蛛網戶牖野草當階生文選二十九雜詩注引魏文帝詩三十直學省愁臥詩注引上一句酒人獻三清絲中列南廂鳴沙石室古籍叢殘類書殘卷宴樂類王韓獨何人翱翔隨天塗文選二十八前緩歌聲注迴頭四向望眼中無故人文選二十五答張士然詩注絹綃白如雪輕華比蟬翼白帖二畫舸覆隄唐語林二蘭芷生兮芙蓉披文選三十一雜體詩注東閣詩東閣詩高山吐慶雲文選三十一雜詩注歌歌長安城西雙員闕上有一雙銅雀一鳴五穀生再鳴五穀熟三輔黃圖二書鈔百五十六引作魏文帝歌詞文選五十六石闕銘注作魏文帝歌御覽三十五又百七十九作魏文帝歌詩紀七拜日東郊詔拜日東郊詔漢氏不拜日於東郊而旦夕常於殿下東面拜日煩褻似家人之事非事天郊神之道也與張郃詔與張郃詔昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壼今將軍外勒戎旅內存國朝朕嘉將軍之意今擢湛為博士褒田豫詔褒田豫詔昔魏絳開懷以納戎賂今卿舉袖以受狄金朕甚嘉焉與群臣又詔與群臣又詔蓋聞千鍾百觚堯舜之飲也惟酒無量仲尼之能也姬旦酒殽不徹故能制禮作樂漢高婆娑巨醉故能斬蛇鞠旅
